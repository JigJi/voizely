worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx/conf/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # DNS resolver for Tailscale Funnel hostname (in case of re-resolution)
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 10s;

    server {
        listen       3000;
        server_name  _;

        access_log logs/voizely_access.log;
        error_log  logs/voizely_error.log;

        client_max_body_size 500m;

        # ----- Local frontend_auth (AD bind + JWT relay) -----
        # Only the login + health endpoints route to local service.
        # Everything else under /api/auth/ goes to backend (e.g. /api/auth/me).

        location = /api/auth/login {
            proxy_pass http://127.0.0.1:8810;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location = /api/auth/health {
            proxy_pass http://127.0.0.1:8810;
        }

        # ----- Backend API (Tailscale Funnel HTTPS) -----

        location /api/ {
            proxy_pass https://voizely-backend.tailb8d083.ts.net;
            proxy_ssl_server_name on;
            proxy_set_header Host voizely-backend.tailb8d083.ts.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # htmx legacy (if any backend route still uses it)
        location /htmx/ {
            proxy_pass https://voizely-backend.tailb8d083.ts.net;
            proxy_ssl_server_name on;
            proxy_set_header Host voizely-backend.tailb8d083.ts.net;
        }

        # ----- React static + SPA routing -----

        root   C:/deploy/voizely/frontend/dist;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
